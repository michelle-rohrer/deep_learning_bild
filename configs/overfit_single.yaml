# Technische Validierung: ein Fall, Dice >= 0.90 (Kap. 3.3)
experiment_name: overfit_single
seed: 42
device: cuda

data_dir: ../cleaned_data_2
checkpoint_dir: checkpoints

patch_size: [128, 128, 32]
patches_per_volume: 64
batch_size: 2
num_workers: 0

base_channels: 16
depth: 4
dropout: 0.0

epochs: 300
learning_rate: 0.001
max_train_steps_per_epoch: null
mc_samples: 1
eval_every_epochs: 1
overfit_eval_mc: false

overfit_subject: "512"
overfit_target_dice: 0.90
subjects: ["512"]

augmentation: false
use_tensorboard: true
tensorboard_log_dir: runs
