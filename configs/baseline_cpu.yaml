# CPU-Durchlauf der Baseline (reduzierte Epochen/Patches; auf GPU: baseline.yaml)
experiment_name: baseline_cpu
seed: 42
device: cpu

data_dir: data
splits_path: splits/folds.json
checkpoint_dir: checkpoints

patch_size: [64, 64, 16]
patches_per_volume: 6
batch_size: 2
num_workers: 0

base_channels: 12
depth: 3
dropout: 0.3

epochs: 25
learning_rate: 0.0001
max_train_steps_per_epoch: 40
loss_name: dice
mc_samples: 5
eval_every_epochs: 2

augmentation: false
use_tensorboard: true
tensorboard_log_dir: runs
