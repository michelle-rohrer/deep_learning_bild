# WandB Sweep-Vorlage für späteres Hyperparameter-Tuning
# Start: wandb sweep configs/sweep_baseline.yaml
#       wandb agent <sweep_id>
program: scripts/train.py
method: bayes
metric:
  name: val_macro_dice_left
  goal: maximize
parameters:
  learning_rate:
    distribution: log_uniform_values
    min: 0.00003
    max: 0.0003
  dropout:
    values: [0.3, 0.5]
  base_channels:
    values: [16, 24]
  patch_size:
    value: [128, 128, 32]
command:
  - ${env}
  - python
  - scripts/train.py
  - --config
  - configs/baseline.yaml
