# HPT Run 4: Dropout p=0.5 (Baseline hat p=0.3)
# Vergleich zur Baseline: nur dropout geändert
experiment_name: hpt_dropout
seed: 42
device: cuda

data_dir: ../cleaned_data_2
splits_path: splits/folds.json
checkpoint_dir: checkpoints

patch_size: [128, 128, 32]
patches_per_volume: 16
batch_size: 2
num_workers: 0

base_channels: 16
depth: 4
dropout: 0.5

epochs: 100
learning_rate: 0.0001
loss_name: dice

mc_samples: 10
eval_every_epochs: 10
eval_use_mc: true  # MC-Dropout aktiv → ECE wird berechnet
eval_mode: volume
eval_z_crop: true
eval_z_margin: 4
eval_bbox_crop: true
eval_bbox_margin: 16
eval_n_slices: 6
eval_log_tensorboard: true
train_log_val_images: true

augmentation: false
use_tensorboard: true
tensorboard_log_dir: runs
