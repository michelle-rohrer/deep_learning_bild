# CPU-Durchlauf (kleinere Patches, weniger MC-Samples) – technische Validierung
experiment_name: overfit_single
seed: 42
device: cpu

data_dir: data
checkpoint_dir: checkpoints

patch_size: [64, 64, 16]
patches_per_volume: 12
batch_size: 2
num_workers: 0

base_channels: 12
depth: 3
dropout: 0.3

epochs: 80
learning_rate: 0.0001
max_train_steps_per_epoch: 25
mc_samples: 3
eval_every_epochs: 2

overfit_subject: "512"
overfit_target_dice: 0.90
subjects: ["512"]

augmentation: false
use_tensorboard: true
tensorboard_log_dir: runs
