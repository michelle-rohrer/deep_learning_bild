# HPT Combined: Focal-Tversky Loss + klassen-balanciertes Sampling
# Beide Fixes greifen auf verschiedenen Ebenen:
#   - class_balanced_sampling: welche Patches (Hamstrings gleich häufig wie VL)
#   - focal_tversky: welche Voxel im Patch (FN stärker bestrafen als FP)
experiment_name: hpt_combined
seed: 42
device: cuda

data_dir: ../cleaned_data_2
splits_path: splits/folds.json
checkpoint_dir: checkpoints

patch_size: [128, 128, 32]
patches_per_volume: 16
batch_size: 2
num_workers: 0

base_channels: 16
depth: 4
dropout: 0.3

epochs: 200
learning_rate: 0.0001
loss_name: focal_tversky
tversky_alpha: 0.3
tversky_beta: 0.7
tversky_gamma: 0.75

class_balanced_sampling: true
augmentation: false

mc_samples: 5
eval_every_epochs: 10
eval_use_mc: false
eval_mode: volume
eval_z_crop: true
eval_z_margin: 4
eval_bbox_crop: true
eval_bbox_margin: 16
eval_n_slices: 6
eval_log_tensorboard: true
train_log_val_images: true

use_tensorboard: true
tensorboard_log_dir: runs
